<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race to the Moon · Hackathon 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="stage">
    <canvas id="stars" aria-hidden="true"></canvas>

    <header class="hud">
      <div class="hud-title">
        <span class="mark" aria-hidden="true">
          <span class="mark-ship"></span>
          <span class="mark-flame"></span>
        </span>
        <div class="hud-title-text">
          <h1>Race to the Moon</h1>
          <p class="hud-sub" id="event-sub">Hackathon 2026</p>
        </div>
      </div>

      <div class="hud-meta">
        <div class="meta-block">
          <span class="meta-label" id="clock-label">Mission time</span>
          <span class="meta-value clock" id="clock">--:--:--</span>
        </div>
        <div class="meta-block meta-right">
          <span class="meta-label">Telemetry</span>
          <span class="meta-value live"><span class="live-dot" id="live-dot"></span><span id="sync">syncing…</span></span>
        </div>
        <div class="demo-flag" id="demo-flag" hidden>Demo data</div>
      </div>
    </header>

    <main class="mission">
      <div class="gauge-field" id="gauge-field">
        <div class="moon" aria-hidden="true">
          <span class="moon-target">The Moon</span>
        </div>
        <div class="gridlines" id="gridlines" aria-hidden="true"></div>

        <!-- easter egg (toggle/customise via config.json "easterEgg") -->
        <div class="cansu" aria-hidden="true" hidden>
          <div class="cansu-craft">
            <svg class="cansu-ship" viewBox="0 0 36 78" xmlns="http://www.w3.org/2000/svg">
              <path class="cansu-body" d="M18 2 C27 13 27 35 23 53 L13 53 C9 35 9 13 18 2 Z" />
              <path class="cansu-fin" d="M13 43 L4 56 L13 51 Z" />
              <path class="cansu-fin" d="M23 43 L32 56 L23 51 Z" />
              <circle class="cansu-window" cx="18" cy="23" r="4.6" />
              <path class="cansu-flame" d="M13 54 Q18 76 23 54 Q18 62 13 54 Z" />
            </svg>
            <span class="cansu-trail"></span>
          </div>
          <div class="cansu-label">
            <span class="cansu-name">Cansu</span>
            <span class="cansu-note">up late squashing bugs</span>
          </div>
        </div>

        <div class="lanes" id="lanes"></div>
      </div>
      <div class="consoles" id="consoles"></div>
    </main>

    <div class="offline-banner" id="offline" hidden>Telemetry offline — retrying…</div>
  </div>

  <!-- screenshot history lightbox -->
  <div class="shot-modal" id="shot-modal" hidden>
    <div class="shot-modal-backdrop" data-close="1"></div>
    <div class="shot-modal-panel" role="dialog" aria-modal="true" aria-label="Team progress screenshots">
      <header class="shot-modal-head">
        <div class="shot-modal-id">
          <span class="shot-dot" id="shot-modal-dot"></span>
          <span class="shot-modal-team" id="shot-modal-team">Team</span>
        </div>
        <div class="shot-modal-sub" id="shot-modal-sub">Progress timeline</div>
        <button class="shot-close" id="shot-close" type="button" aria-label="Close">×</button>
      </header>
      <div class="shot-stage">
        <button class="shot-nav prev" id="shot-prev" type="button" aria-label="Newer snapshot">‹</button>
        <div class="shot-stage-frame">
          <img class="shot-stage-img" id="shot-stage-img" alt="Team progress screenshot" />
          <div class="shot-stage-cap" id="shot-stage-cap"></div>
        </div>
        <button class="shot-nav next" id="shot-next" type="button" aria-label="Older snapshot">›</button>
      </div>
      <div class="shot-strip" id="shot-strip"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
